name: SonarQube Cloud

on:
  push:
    branches:
      - main
      - master
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

jobs:
  sonarcloud:
    name: Build, P3C PMD, SpotBugs, and SonarQube Cloud
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Ensure SonarCloud Java rules
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}
          SONAR_PROJECT_KEY: a1351995160_yungateway-minimal-token-wps
        run: |
          python3 scripts/ensure_sonarcloud_rules.py || \
            echo "::warning::SONAR_TOKEN cannot manage SonarCloud quality profiles; local PMD and SpotBugs checks remain enforced."

      - name: Build, run local static checks, and scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          chmod +x ./mvnw
          ./mvnw -B verify pmd:pmd pmd:check spotbugs:check sonar:sonar \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }} \
            -Dsonar.projectKey=a1351995160_yungateway-minimal-token-wps \
            -Dsonar.projectName=yungateway-minimal-token-wps \
            -Dsonar.java.pmd.reportPaths=target/pmd.xml \
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

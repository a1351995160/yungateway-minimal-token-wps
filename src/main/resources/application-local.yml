spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${LOCAL_MYSQL_HOST:127.0.0.1}:${LOCAL_MYSQL_PORT:3306}/${LOCAL_MYSQL_DATABASE:yundoc_local}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
    username: ${LOCAL_MYSQL_USERNAME}
    password: ${LOCAL_MYSQL_PASSWORD}

server:
  port: ${LOCAL_SERVER_PORT:${SERVER_PORT:8080}}

management:
  endpoint:
    health:
      show-details: always

yundoc:
  readiness:
    tdsql-required: true
  client-secret:
    pepper: ${YUNDOC_LOCAL_CLIENT_SECRET_PEPPER}
    algorithm: HMAC-SHA256
  jwt:
    issuer: yundoc-gateway-local
    audience: yundoc-business-systems-local
    secret: ${YUNDOC_LOCAL_BUSINESS_JWT_SECRET}
    ttl: ${YUNDOC_LOCAL_BUSINESS_JWT_TTL:30m}
  wps-client:
    base-url: ${WPS_LOCAL_BASE_URL:https://wps.test}
    redirect-uri: ${WPS_LOCAL_REDIRECT_URI:http://localhost:8080/api/v1/wps/oauth/callback}
    oauth-scope: ${WPS_LOCAL_OAUTH_SCOPE:files.read}
    app-id: ${WPS_LOCAL_APP_ID:local-wps-app-id}
    app-secret: ${WPS_LOCAL_APP_SECRET:}
    connect-timeout: ${WPS_LOCAL_CONNECT_TIMEOUT:2s}
    read-timeout: ${WPS_LOCAL_READ_TIMEOUT:5s}
    max-retries: ${WPS_LOCAL_MAX_RETRIES:1}

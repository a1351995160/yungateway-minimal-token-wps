spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${LOCAL_MYSQL_HOST:127.0.0.1}:${LOCAL_MYSQL_PORT:3306}/${LOCAL_MYSQL_TEST_DATABASE:yundoc_test}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
    username: ${LOCAL_MYSQL_USERNAME:root}
    password: ${LOCAL_MYSQL_PASSWORD:123456}
  sql:
    init:
      mode: always
      schema-locations:
        - classpath:db/schema-clean.sql
        - classpath:db/schema.sql

management:
  endpoint:
    health:
      show-details: always

yundoc:
  client-secret:
    pepper: test-client-secret-pepper
    algorithm: HMAC-SHA256
  jwt:
    issuer: yundoc-gateway-test
    audience: yundoc-business-systems-test
    secret: test-business-jwt-secret-with-enough-length
    ttl: 30m
  wps-client:
    base-url: https://wps.test
    preview-path: /api/preview-links
    token-path: /oauth/token
    file-list-path: /api/user/files
    authorize-path: /oauth/authorize
    user-token-path: /oauth/user-token
    redirect-uri: https://gateway.test/api/v1/wps/oauth/callback
    oauth-scope: files.read
    app-id: test-wps-app-id
    app-secret: ${WPS_TEST_APP_SECRET:local-wps-placeholder}
    connect-timeout: 1s
    read-timeout: 1s
    max-retries: 1
  wps-credential:
    refresh-skew: 5m
    max-user-token-count: 10000
  wps-user-authorization:
    max-state-count: 10000
